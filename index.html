<!DOCTYPE html>
<html lang="hi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MyPocket - Kharcha Tracker</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#2563eb">

  <style>
    body { font-family: system-ui, sans-serif; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen">

  <div class="max-w-xl mx-auto bg-white shadow-2xl min-h-screen">
    <!-- Modern Header -->
    <div class="bg-gradient-to-r from-blue-600 to-blue-700 text-white p-6 text-center">
      <h1 class="text-4xl font-bold">💰 MyPocket</h1>
      <p class="text-blue-100 mt-1 text-lg">Apna Roz ka Kharcha Track Karo</p>
    </div>

    <!-- Dashboard -->
    <div class="p-5 grid grid-cols-3 gap-3">
      <div class="bg-blue-50 p-4 rounded-3xl text-center">
        <p class="text-sm text-gray-600">Aaj Ka</p>
        <p id="todayTotal" class="text-3xl font-bold text-blue-600">₹0</p>
      </div>
      <div class="bg-green-50 p-4 rounded-3xl text-center">
        <p class="text-sm text-gray-600">Is Month</p>
        <p id="monthTotal" class="text-3xl font-bold text-green-600">₹0</p>
      </div>
      <div class="bg-orange-50 p-4 rounded-3xl text-center">
        <p class="text-sm text-gray-600">Baki</p>
        <p id="remaining" class="text-3xl font-bold text-orange-600">₹1000</p>
      </div>
    </div>

    <div class="px-5 pb-2">
      <button onclick="setPocketMoney()" class="text-blue-600 underline">Pocket Money Change Karo</button>
    </div>

    <!-- Add Expense -->
    <div class="px-5 pb-5">
      <h2 class="font-semibold mb-4">➕ Naya Kharcha</h2>
      <div class="space-y-4">
        <input id="amount" type="number" placeholder="Amount ₹" class="w-full p-4 border rounded-3xl text-lg">
        <select id="category" class="w-full p-4 border rounded-3xl text-lg">
          <option value="Tiffin">🍱 Tiffin / Food</option>
          <option value="Rickshaw">🛺 Rickshaw / Auto</option>
          <option value="Stationery">📚 Stationery</option>
          <option value="Snacks">🥤 Snacks / Drink</option>
          <option value="Recharge">📱 Recharge</option>
          <option value="Other">🛒 Other</option>
        </select>
        <input id="note" type="text" placeholder="Note (optional)" class="w-full p-4 border rounded-3xl">
        
        <button onclick="addExpense()" class="w-full bg-blue-600 text-white py-5 rounded-3xl text-xl font-semibold">
          Add Karo
        </button>
      </div>
    </div>

    <!-- Chart -->
    <div class="p-5">
      <h2 class="font-semibold mb-3">📊 Category Wise Kharcha</h2>
      <canvas id="myChart" height="220"></canvas>
    </div>

    <!-- History -->
    <div class="p-5 pt-0">
      <div class="flex justify-between mb-3">
        <h2 class="font-semibold">📋 Recent Kharcha</h2>
        <button onclick="clearAllData()" class="text-red-500 text-sm">Clear All</button>
      </div>
      <div id="history" class="space-y-3"></div>
    </div>
  </div>

  <script>
    let expenses = JSON.parse(localStorage.getItem('expenses')) || [];
    let pocketMoney = parseInt(localStorage.getItem('pocketMoney')) || 1000;

    function saveData() {
      localStorage.setItem('expenses', JSON.stringify(expenses));
      localStorage.setItem('pocketMoney', pocketMoney);
      renderAll();
    }

    function addExpense() {
      const amount = parseFloat(document.getElementById('amount').value);
      if (!amount) return alert("Amount daalo bhai!");
      
      expenses.unshift({
        id: Date.now(),
        date: new Date().toISOString().split('T')[0],
        amount,
        category: document.getElementById('category').value,
        note: document.getElementById('note').value || ''
      });
      
      document.getElementById('amount').value = '';
      document.getElementById('note').value = '';
      saveData();
    }

    function deleteExpense(id) {
      if (confirm("Delete?")) {
        expenses = expenses.filter(e => e.id !== id);
        saveData();
      }
    }

    function setPocketMoney() {
      const amt = prompt("Naya Pocket Money Amount:", pocketMoney);
      if (amt) {
        pocketMoney = parseInt(amt);
        saveData();
      }
    }

    function clearAllData() {
      if (confirm("Pura data delete karna hai?")) {
        expenses = [];
        saveData();
      }
    }

    function renderAll() {
      const today = new Date().toISOString().split('T')[0];
      const todayTotal = expenses.filter(e => e.date === today).reduce((s,e)=>s+e.amount,0);
      const monthTotal = expenses.filter(e => new Date(e.date).getMonth() === new Date().getMonth()).reduce((s,e)=>s+e.amount,0);

      document.getElementById('todayTotal').textContent = '₹' + todayTotal;
      document.getElementById('monthTotal').textContent = '₹' + monthTotal;
      document.getElementById('remaining').textContent = '₹' + (pocketMoney - monthTotal);

      // History
      document.getElementById('history').innerHTML = expenses.map(exp => `
        <div class="bg-white p-4 rounded-3xl border flex justify-between">
          <div>
            <div class="font-medium">${exp.category}</div>
            <div class="text-xs text-gray-500">${exp.date}</div>
          </div>
          <div class="text-right">
            <div class="text-2xl font-bold text-red-600">-₹${exp.amount}</div>
            <button onclick="deleteExpense(${exp.id})" class="text-red-500 text-xs">Delete</button>
          </div>
        </div>
      `).join('');

      // Chart (simple)
      const ctx = document.getElementById('myChart');
      if (window.myChart) window.myChart.destroy();
      const catData = {};
      expenses.forEach(e => catData[e.category] = (catData[e.category]||0) + e.amount);
      window.myChart = new Chart(ctx, {
        type: 'pie',
        data: { labels: Object.keys(catData), datasets: [{ data: Object.values(catData), backgroundColor: ['#3b82f6','#10b981','#f59e0b','#ef4444'] }] }
      });
    }

    renderAll();
  </script>
</body>
</html>
